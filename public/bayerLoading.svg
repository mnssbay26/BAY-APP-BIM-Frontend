<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 360 260" xmlns="http://www.w3.org/2000/svg">
  <!-- ─── Gradiente y estilos ─── -->
  <defs>
    <!-- Verde Bayer → Azul Bayer -->
    <linearGradient id="bayerGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00954B"/>
      <stop offset="100%" stop-color="#0067B1"/>
    </linearGradient>

    <style><![CDATA[
      @keyframes blink { 50% { opacity:.35 } }

      .txt{
        /* Aproxima la tipografía del logo */
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-weight: 700;          /* Bold */
        font-size: 48px;           /* un poco más grande */
        letter-spacing: 0px;       /* sin tracking extra */
        fill: url(#bayerGradient); /* gradiente corporativo */
        animation: blink 1.3s ease-in-out infinite;
      }
    ]]></style>
  </defs>

  <!-- ─── Texto central ─── -->
  <text class="txt"
        x="50%" y="50%" text-anchor="middle" dominant-baseline="middle">
    BAYER
  </text>
</svg>
